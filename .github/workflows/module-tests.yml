name: Module Tests

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      compose_app: ${{ steps.filter.outputs.compose_app }}
      shared: ${{ steps.filter.outputs.shared }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "server=true" >> "$GITHUB_OUTPUT"
            echo "compose_app=true" >> "$GITHUB_OUTPUT"
            echo "shared=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          zero_sha="0000000000000000000000000000000000000000"
          default_branch="${{ github.event.repository.default_branch }}"
          event_name="${{ github.event_name }}"
          after_sha="${{ github.sha }}"
          before_sha="${{ github.event.before }}"
          changed_files=""

          ensure_default_branch_ref() {
            if [[ "$(git rev-parse --is-shallow-repository)" == "true" ]]; then
              git fetch origin "$default_branch" --unshallow
            elif ! git show-ref --verify --quiet "refs/remotes/origin/$default_branch"; then
              git fetch origin "$default_branch" --depth=1
            fi
          }

          if [[ "$event_name" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"

            echo "Diffing pull request changes: $base_sha..$head_sha"
            if [[ -n "$base_sha" && -n "$head_sha" ]] &&
              git cat-file -e "$base_sha^{commit}" 2>/dev/null &&
              git cat-file -e "$head_sha^{commit}" 2>/dev/null; then
              changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
            else
              echo "Falling back to merge-base diff against origin/$default_branch for pull request"
              ensure_default_branch_ref
              merge_base="$(git merge-base "origin/$default_branch" "$after_sha")"
              changed_files="$(git diff --name-only "$merge_base" "$after_sha")"
            fi
          elif [[ "${{ github.ref_name }}" != "$default_branch" ]]; then
            echo "Diffing branch changes from merge-base with origin/$default_branch"
            ensure_default_branch_ref
            merge_base="$(git merge-base "origin/$default_branch" "$after_sha")"
            changed_files="$(git diff --name-only "$merge_base" "$after_sha")"
          elif [[ -n "$before_sha" && "$before_sha" != "$zero_sha" ]] &&
            git cat-file -e "$before_sha^{commit}" 2>/dev/null; then
            echo "Diffing default branch push changes: $before_sha..$after_sha"
            changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
          else
            echo "Falling back to diffing from origin/$default_branch"
            ensure_default_branch_ref
            merge_base="$(git merge-base "origin/$default_branch" "$after_sha")"
            changed_files="$(git diff --name-only "$merge_base" "$after_sha")"
          fi

          echo "Changed files under evaluation:"
          printf '%s\n' "$changed_files"

          server=false
          compose_app=false
          shared=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            echo "Changed: $file"

            case "$file" in
              server/*|shared/*|build.gradle.kts|settings.gradle.kts|gradle.properties|gradle/wrapper/*|gradle/libs.versions.toml)
                server=true
                ;;
            esac

            case "$file" in
              composeApp/*|shared/*|build.gradle.kts|settings.gradle.kts|gradle.properties|gradle/wrapper/*|gradle/libs.versions.toml)
                compose_app=true
                ;;
            esac

            case "$file" in
              shared/*|build.gradle.kts|settings.gradle.kts|gradle.properties|gradle/wrapper/*|gradle/libs.versions.toml)
                shared=true
                ;;
            esac
          done <<< "$changed_files"

          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "compose_app=$compose_app" >> "$GITHUB_OUTPUT"
          echo "shared=$shared" >> "$GITHUB_OUTPUT"

  server:
    name: Server
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run server tests
        run: ./gradlew server:test

      - name: Publish server test report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: Server Test Report
          report_paths: server/build/test-results/**/*.xml

  compose-app-android:
    needs: changes
    if: ${{ needs.changes.outputs.compose_app == 'true' }}
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Compose App Android
      runs-on: ubuntu-latest
      boot-ios-simulator: false
      gradle-task: composeApp:testDebugUnitTest
      report-paths: composeApp/build/test-results/**/*.xml

  compose-app-ios:
    needs: changes
    if: ${{ needs.changes.outputs.compose_app == 'true' }}
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Compose App iOS
      gradle-task: composeApp:iosSimulatorArm64Test
      report-paths: composeApp/build/test-results/**/*.xml

  compose-app-js:
    needs: changes
    if: ${{ needs.changes.outputs.compose_app == 'true' }}
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Compose App JS
      runs-on: ubuntu-latest
      boot-ios-simulator: false
      gradle-task: composeApp:jsTest
      report-paths: composeApp/build/test-results/**/*.xml

  compose-app-wasm:
    needs: changes
    if: ${{ needs.changes.outputs.compose_app == 'true' }}
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Compose App WASM
      runs-on: ubuntu-latest
      boot-ios-simulator: false
      gradle-task: composeApp:wasmJsTest
      report-paths: composeApp/build/test-results/**/*.xml

  shared:
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' }}
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Shared
      runs-on: ubuntu-latest
      boot-ios-simulator: false
      gradle-task: shared:jvmTest shared:jsTest
      report-paths: shared/build/test-results/**/*.xml
