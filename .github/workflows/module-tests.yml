name: Module Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run server tests
        run: ./gradlew server:test

  compose-app:
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Compose App
      gradle-task: composeApp:allTests

  shared:
    uses: ./.github/workflows/kmp-module-tests.yml
    with:
      job-name: Shared
      gradle-task: shared:allTests
