name: Formatting

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spotless:
    name: Spotless Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Spotless check
        run: ./gradlew spotlessCheck
